name: Oracle Account B Launcher

# Account-agnostic workflow. The actual OCI account is determined by the
# `account_b` GitHub Environment, which holds the secrets used below.

on:
  schedule:
    # Runs at :15 and :45 every hour (UTC) — staggered from account-a.
    - cron: '15,45 * * * *'
  workflow_dispatch: {}

concurrency:
  group: oracle-account-b
  cancel-in-progress: false

jobs:
  launch:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: account_b

    env:
      ACCOUNT_KEY: account-b

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Sanity-check jq
        run: jq --version

      - name: Install OCI CLI
        run: |
          set -e
          curl -fsSL -o install.sh https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh
          bash install.sh --accept-all-defaults --install-dir "$HOME/oci-cli" --exec-dir "$HOME/bin"
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Verify OCI CLI
        run: oci --version

      - name: Write SSH public key
        env:
          SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
        run: |
          mkdir -p "$HOME/.ssh"
          printf '%s\n' "$SSH_PUBLIC_KEY" > "$HOME/.ssh/id_rsa.pub"
          chmod 644 "$HOME/.ssh/id_rsa.pub"

      - name: Write OCI config + API key
        env:
          OCI_USER: ${{ secrets.OCI_USER }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_TENANCY: ${{ secrets.OCI_TENANCY }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_KEY_PEM: ${{ secrets.OCI_KEY_PEM }}
        run: |
          mkdir -p "$HOME/.oci"
          printf '%s\n' "$OCI_KEY_PEM" > "$HOME/.oci/api-key.pem"
          chmod 600 "$HOME/.oci/api-key.pem"
          cat > "$HOME/.oci/config" <<EOF
          [DEFAULT]
          user=$OCI_USER
          fingerprint=$OCI_FINGERPRINT
          key_file=$HOME/.oci/api-key.pem
          tenancy=$OCI_TENANCY
          region=$OCI_REGION
          EOF
          chmod 600 "$HOME/.oci/config"

      - name: Write account env file
        env:
          ACCOUNT_LABEL: ${{ secrets.ACCOUNT_LABEL }}
          COMPARTMENT_OCID: ${{ secrets.COMPARTMENT_OCID }}
          SUBNET_OCID: ${{ secrets.SUBNET_OCID }}
          IMAGE_OCID: ${{ secrets.IMAGE_OCID }}
          AD_NAMES: ${{ secrets.AD_NAMES }}
          INSTANCE_NAME: ${{ secrets.INSTANCE_NAME }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          mkdir -p accounts
          cat > "accounts/${ACCOUNT_KEY}.env" <<EOF
          ACCOUNT_LABEL="$ACCOUNT_LABEL"
          COMPARTMENT_OCID="$COMPARTMENT_OCID"
          SUBNET_OCID="$SUBNET_OCID"
          IMAGE_OCID="$IMAGE_OCID"
          AD_NAMES="$AD_NAMES"
          INSTANCE_NAME="$INSTANCE_NAME"
          INSTANCE_SHAPE="VM.Standard.A1.Flex"
          INSTANCE_OCPUS="2"
          INSTANCE_MEMORY_GB="12"
          SSH_PUBLIC_KEY_PATH="\$HOME/.ssh/id_rsa.pub"
          OCI_PROFILE="DEFAULT"
          MAX_RETRIES="3"
          RETRY_INTERVAL="60"
          TELEGRAM_BOT_TOKEN="$TELEGRAM_BOT_TOKEN"
          TELEGRAM_CHAT_ID="$TELEGRAM_CHAT_ID"
          EOF

      - name: Run launcher
        run: |
          chmod +x ./oracle-launch.sh
          ./oracle-launch.sh "$ACCOUNT_KEY"
